<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Community Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Local Community Event Portal</h1>
    </header>

    <!-- Navigation -->
    <nav>

        <div class="eventCard">

        <div class="eventCard">
            <img src="event2.jpg" alt="Food Fair">
