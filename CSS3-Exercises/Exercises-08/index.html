<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model & Layout Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Local Community Event Portal</h1>

    <!-- Event Cards -->
    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy live performances by local artists.</p>
    </div>

    <div class="eventCard">
        <h2>Food Fair</h2>
        <p>Experience delicious food from different cuisines.</p>
    </div>

    <!-- Form Section -->
    <h2>Register for an Event</h2>

    <form>
        <input type="text" placeholder="Enter your name" class="highlight">

        <input type="email" placeholder="Enter your email">
    </form>

    <!-- Visibility Example -->
    <div class="hiddenBox">
        visibility: hidden
    </div>

    <div class="noneBox">
        display: none
    </div>

    <div class="normalBox">
        This box is visible.
    </div>

</body>
</html>
