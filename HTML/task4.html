<!--
4. Image Gallery for Community Events 
Scenario: Show images from past events in a table layout. 
Objective: Work with <img>, tables, and formatting tags. 
Task: 
• Use a <table> with 2 rows and 3 columns of <img> tags 
• Include alt, title, and style each image with borders using a class 
• Add a caption to describe each event
-->


<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , initial-scale=1.0">
        <style>
            .animal
            {
                height: 300px;
                width: 400px;
                border: 2px solid black;
            
            }
        </style>
    </head>
    <body>
        <table style="width:1px;">
          
            <caption style="text-align:center"><b style="color: blueviolet; background-color:bisque; font-weight: bold; font-size:400%; ">
            Gallery of Animals</b></caption>

            <tr>
             <td><img class="animal" src="Loin.jpg" alt="Loin" title="Loin">
                  <p>Lion Safari Event</p>
            </td>

             <td><img class="animal" src="tiger.jpg" alt="Tiger" title="Tiger">
             <p>Tiger Conservation Program</p>
            </td>
             <td><img class="animal" src="cheetah.jpg" alt="Cheetah" title="Cheetah">
            <p>Cheetah Awareness Event</p>
        </td>
            </tr>
          
            <tr>
                <td><img class="animal" src="Elephant.jpg" alt="Elephant" title="Elephant">
                <p>Elephant Protection Event</p>
                </td>
               <td><img class="animal" src="dogs.jpg" alt="Dogs" title="Dogs">
               <p>Dogs Circus</p> 
              </td>
               <td><img class="animal" src="Zebra.jpg" alt="Zebra" title="Zebra">
              <p>Zebras Display Event</p>  
            </td>
            </tr>
        </table>
    </body>
</html>
