<!DOCTYPE html>
<html>
<head>
  <title>Debugging with Chrome DevTools</title>

  <style>
    body {
      font-family: Arial;
    }

    .box {
      width: 200px;
      height: 200px;
      background-color: lightblue;
      margin: 20px;
      text-align: center;
      line-height: 200px;
    }
  </style>
</head>

<body>

  <h2>Chrome DevTools Debugging Demo</h2>

  <div class="box" id="box">Click Me</div>

  <button onclick="changeColor()">Change Color</button>

  <p id="msg"></p>

  <script>
    console.log("Page Loaded Successfully");

    function changeColor() {
      console.log("Button clicked");

      let box = document.getElementById("box");

      let colors = ["red", "green", "yellow", "orange"];

      let randomIndex = Math.floor(Math.random() * colors.length);

      console.log("Selected color:", colors[randomIndex]);

      box.style.backgroundColor = colors[randomIndex];

      document.getElementById("msg").innerText =
        "Color changed to " + colors[randomIndex];
    }
  </script>

</body>
</html>
